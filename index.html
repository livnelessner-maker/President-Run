<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President Run - Original Images Edition</title>
    <style>
        body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; color: white; user-select: none; }
        
        /* גודל מסך פרופורציונלי שלא מועך את התמונות */
        #gameContainer { position: relative; width: 1200px; height: 600px; border: 4px solid #fff; border-radius: 12px; overflow: hidden; background: linear-gradient(to bottom, #1a8cff, #80bfff); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 100%; display: block; background: transparent; }
        
        /* מסכי תפריט */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        h1 { font-size: 60px; color: #ffe600; margin: 0; text-shadow: 4px 4px 0px #ff4500; }
        h2 { font-size: 40px; color: #ff3333; margin: 0; }
        
        .menuBtn { padding: 15px 35px; font-size: 22px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; width: 320px; transition: 0.2s; text-align: center; }
        #googleBtn { background: #4285F4; color: white; }
        #guestBtn { background: #555; color: white; }
        .restartBtn { background: #28a745; color: white; width: 200px; }
        #shopBtn { background: #ffc107; color: #222; width: 150px; position: absolute; top: 20px; right: 20px; z-index: 10; font-size: 18px; padding: 10px; }
        
        /* ממשק עליון */
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); z-index: 10; display: flex; gap: 30px; }
        .score-span { color: #fff; }
        .coin-span { color: #ffe600; }

        /* חנות דמויות */
        #shopMenu { display: none; }
        .shop-grid { display: flex; gap: 20px; margin-top: 20px; }
        .shop-item { background: #333; padding: 15px; border-radius: 8px; text-align: center; border: 2px solid #555; width: 120px; cursor: pointer; }
        .shop-item.active { border-color: #ffe600; background: #444; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="startMenu" class="overlay">
        <h1>President Run</h1>
        <button id="googleBtn" class="menuBtn">Login with Google</button>
        <button id="guestBtn" class="menuBtn">Play as Guest</button>
    </div>

    <div id="gameOverMenu" class="overlay" style="display: none;">
        <h2>GAME OVER</h2>
        <p id="finalScore" style="font-size: 24px;">Score: 0</p>
        <button id="restartBtn" class="menuBtn restartBtn">Try Again</button>
    </div>

    <div id="shopMenu" class="overlay">
        <h2>PRESIDENT SHOP</h2>
        <p>Your Coins: <span class="coin-span" id="shopCoins">0</span></p>
        <div class="shop-grid">
            <div class="shop-item active" onclick="selectCharacter('trump')"><h3>Trump</h3><p>Selected</p></div>
            <div class="shop-item" id="item-bibi" onclick="buyOrSelect('bibi', 10)"><h3>Bibi</h3><p id="cost-bibi">10 Coins</p></div>
            <div class="shop-item" id="item-biden" onclick="buyOrSelect('biden', 20)"><h3>Biden</h3><p id="cost-biden">20 Coins</p></div>
            <div class="shop-item" id="item-obama" onclick="buyOrSelect('obama', 30)"><h3>Obama</h3><p id="cost-obama">30 Coins</p></div>
        </div>
        <button class="menuBtn" style="background:#555; width: 150px; margin-top:20px;" onclick="closeShop()">Back</button>
    </div>

    <div id="ui">
        <div>Score: <span id="scoreVal" class="score-span">0</span></div>
        <div>Trump Coins: $<span id="coinVal" class="coin-span">0</span></div>
    </div>

    <button id="shopBtn" class="menuBtn">Shop</button>

    <canvas id="gameCanvas" width="1200" height="600"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCQMWbsG_GaQspfxuVtj-nQtPudjR2EFTU",
        authDomain: "trumponline-19jun13.firebaseapp.com",
        projectId: "trumponline-19jun13",
        storageBucket: "trumponline-19jun13.firebasestorage.app",
        messagingSenderId: "471601850185",
        appId: "1:471601850185:web:f69312deca49ed1ed71c98"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    let gameActive = false, score = 0, coins = 0, speed = 8;
    let currentSkin = 'trump';
    let unlockedSkins = ['trump'];

    // מידות מותאמות לתמונות
    const player = { x: 120, y: 430, w: 85, h: 120, dy: 0, jumpForce: -20, gravity: 0.9, grounded: false };
    let obstacles = [];
    let coinItems = [];

    // טעינת קבצי ה-PNG שלך
    const images = {
        trump: new Image(),
        bibi: new Image(),
        biden: new Image(),
        obama: new Image(),
        protester: new Image(),
        coin: new Image()
    };

    images.trump.src = 'trump.png';
    images.bibi.src = 'bibi.png';
    images.biden.src = 'biden.png';
    images.obama.src = 'obama.png';
    images.protester.src = 'protester.png';
    images.coin.src = 'coin.png';

    window.addEventListener("keydown", (e) => {
        if ((e.code === "Space" || e.code === "ArrowUp") && player.grounded && gameActive) { 
            player.dy = player.jumpForce; 
            player.grounded = false; 
        }
    });

    function spawnObstacle() {
        obstacles.push({ x: 1300, y: 450, w: 75, h: 100 });
    }

    function spawnCoin() {
        coinItems.push({ x: 1300 + Math.random() * 300, y: 230 + Math.random() * 150, w: 45, h: 45 });
    }

    function update() {
        player.dy += player.gravity;
        player.y += player.dy;
        if (player.y + player.h > 550) { 
            player.y = 550 - player.h; 
            player.dy = 0; 
            player.grounded = true; 
        }

        obstacles.forEach((o, index) => {
            o.x -= speed;
            if (o.x < -100) obstacles.splice(index, 1);
            if (player.x < o.x + o.w && player.x + player.w > o.x && player.y + player.h > o.y) {
                endGame();
            }
        });

        coinItems.forEach((c, index) => {
            c.x -= speed;
            if (c.x < -50) coinItems.splice(index, 1);
            
            if (player.x < c.x + c.w && player.x + player.w > c.x && player.y + player.h > c.y && player.y < c.y + c.h) {
                coins++;
                document.getElementById("coinVal").innerText = coins;
                coinItems.splice(index, 1);
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, 1200, 600);
        
        // הרצפה
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 550, 1200, 50);

        // רינדור קובץ התמונה של הדמות
        const activeImg = images[currentSkin];
        if (activeImg.complete && activeImg.width > 0) {
            ctx.drawImage(activeImg, player.x, player.y, player.w, player.h);
        } else {
            ctx.fillStyle = "blue"; // גיבוי זמני אם הקובץ לא בתיקייה
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        // רינדור קובץ התמונה של המפגין
        obstacles.forEach(o => {
            if (images.protester.complete && images.protester.width > 0) {
                ctx.drawImage(images.protester, o.x, o.y, o.w, o.h);
            } else {
                ctx.fillStyle = "red";
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }
        });

        // רינדור קובץ התמונה של המטבע
        coinItems.forEach(c => {
            if (images.coin.complete && images.coin.width > 0) {
                ctx.drawImage(images.coin, c.x, c.y, c.w, c.h);
            } else {
                ctx.fillStyle = "gold";
                ctx.fillRect(c.x, c.y, c.w, c.h);
            }
        });
    }

    let obstacleTimer, coinTimer;
    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        document.getElementById("startMenu").style.display = "none";
        document.getElementById("gameOverMenu").style.display = "none";
        gameActive = true;
        score = 0;
        speed = 8;
        player.y = 430;
        player.dy = 0;
        obstacles = [];
        coinItems = [];
        document.getElementById("scoreVal").innerText = score;
        
        clearInterval(obstacleTimer);
        clearInterval(coinTimer);
        obstacleTimer = setInterval(() => { if(gameActive) { spawnObstacle(); score++; document.getElementById("scoreVal").innerText = score; if(score%5===0) speed+=1; } }, 2000);
        coinTimer = setInterval(() => { if(gameActive) spawnCoin(); }, 1500);

        gameLoop();
    }

    function endGame() {
        gameActive = false;
        clearInterval(obstacleTimer);
        clearInterval(coinTimer);
        document.getElementById("finalScore").innerText = "Score: " + score;
        document.getElementById("gameOverMenu").style.display = "flex";
    }

    window.buyOrSelect = function(name, cost) {
        if (unlockedSkins.includes(name)) {
            window.selectCharacter(name);
        } else if (coins >= cost) {
            coins -= cost;
            unlockedSkins.push(name);
            document.getElementById("coinVal").innerText = coins;
            document.getElementById("shopCoins").innerText = coins;
            document.getElementById("cost-" + name).innerText = "Unlocked";
            window.selectCharacter(name);
        } else {
            alert("Not enough Coins!");
        }
    }

    window.selectCharacter = function(name) {
        currentSkin = name;
        document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('active'));
        if(name === 'trump') document.querySelectorAll('.shop-item')[0].classList.add('active');
        if(name === 'bibi') document.getElementById('item-bibi').classList.add('active');
        if(name === 'biden') document.getElementById('item-biden').classList.add('active');
        if(name === 'obama') document.getElementById('item-obama').classList.add('active');
    }

    window.closeShop = function() { document.getElementById("shopMenu").style.display = "none"; }
    document.getElementById("shopBtn").addEventListener("click", () => {
        document.getElementById("shopCoins").innerText = coins;
        document.getElementById("shopMenu").style.display = "flex";
    });

    document.getElementById("restartBtn").addEventListener("click", startGame);
    document.getElementById("guestBtn").addEventListener("click", startGame);
    document.getElementById("googleBtn").addEventListener("click", async () => {
        try { await signInWithPopup(auth, provider); startGame(); } catch (e) { startGame(); }
    });
</script>
</body>
</html>
